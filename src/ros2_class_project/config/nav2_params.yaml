local_costmap:
  ros__parameters:
    use_sim_time: false
    global_frame: odom  # local costmap lives in odom frame (smooth, short-term motion)
    robot_base_frame: base_footprint
    update_frequency: 5.0
    publish_frequency: 2.0
    rolling_window: true  # IMPORTANT: makes costmap move with robot (fixes “weird drifting/rotated local map” feeling)
    width: 3.0
    height: 3.0
    resolution: 0.05
    robot_radius: 0.18
    transform_tolerance: 0.5

    plugins: ["obstacle_layer", "inflation_layer"]

    obstacle_layer:
      plugin: "nav2_costmap_2d::ObstacleLayer"
      enabled: true
      observation_sources: scan
      scan:
        topic: /scan
        data_type: "LaserScan"
        marking: true
        clearing: true
        obstacle_max_range: 2.5
        raytrace_max_range: 3.0
        max_obstacle_height: 2.0

    inflation_layer:
      plugin: "nav2_costmap_2d::InflationLayer"
      inflation_radius: 0.30
      cost_scaling_factor: 3.0

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map  # global planner works in map frame (long-term consistency)
      robot_base_frame: base_footprint
      update_frequency: 1.0
      publish_frequency: 1.0
      resolution: 0.05
      robot_radius: 0.18
      transform_tolerance: 0.5

      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: true
          clearing: true
          obstacle_max_range: 2.5
          raytrace_max_range: 3.0
          max_obstacle_height: 2.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.30
        cost_scaling_factor: 3.0


controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0

    controller_plugins: ["FollowPath"]
    goal_checker_plugins: ["general_goal_checker"]
    current_goal_checker: "general_goal_checker"

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.35
      stateful: true

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"

      debug_trajectory_details: true

      min_vel_x: 0.0
      max_vel_x: 0.20
      min_vel_y: 0.0
      max_vel_y: 0.0
      max_vel_theta: 0.8
      min_speed_xy: 0.0
      max_speed_xy: 0.20
      min_speed_theta: 0.0

      acc_lim_x: 0.4
      acc_lim_y: 0.0
      acc_lim_theta: 1.0
      decel_lim_x: -0.4
      decel_lim_y: 0.0
      decel_lim_theta: -1.0

      vx_samples: 20
      vy_samples: 1
      vtheta_samples: 20

      sim_time: 1.5
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.5
      xy_goal_tolerance: 0.25
      trans_stopped_velocity: 0.05
      short_circuit_trajectory_evaluation: true
      stateful: true

      critics: [
        "RotateToGoal",
        "Oscillation",
        "BaseObstacle",
        "GoalAlign",
        "PathAlign",
        "PathDist",
        "GoalDist"
      ]

      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]
    transform_tolerance: 1.0

    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"


behavior_server:
  ros__parameters:
    use_sim_time: false
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.5

    max_rotational_vel: 0.8
    min_rotational_vel: 0.2
    rotational_acc_lim: 1.0